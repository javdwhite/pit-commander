<!DOCTYPE html>
<html lang="en">

<head>

  <title>Pit Commander</title>
  <meta charset="UTF-8" />
  <meta name="description" content="The Pit Commander is a local pitmaster who puts time, smoke, and soul into every meal. " />
  <meta name="author" content="Javion White" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Style Sheet -->
  <link href="assets/css/style.css" rel="stylesheet" />
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
</head>

<body>
  <header class="primary">
    <h1 class=>
      <a href="../index.html" class="permanent-marker-regular">The Pit Commander</a>
    </h1>
    <nav class="primary container" aria-label="Primary">
      <ul class="permanent-marker-regular">
        <li><a href="index.html">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#footer">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main landmark gives you a clean selector target for weeks 6–9 -->
  <main id="main-content" class="container">

    <section id="content" class="subheader">
      <h2 class="permanent-marker-regular">Food</h2>
      <div class="food-imgs">
        <div class="food-item">
          <img src="assets/img/oxtail.jpg" alt="">
          <p class="caption">Oxtail</p>
        </div>

        <div class="food-item">
          <img src="assets/img/full-slab.jpg" alt="">
          <p class="caption">Full Slab</p>
        </div>

        <div class="food-item">
          <img src="assets/img/food3.jpg" alt="">
          <p class="caption">Rib Tips</p>
        </div>

        <div class="food-item">
          <img src="assets/img/ribs.jpg" alt="">
          <p class="caption">Ribs</p>
        </div>
      </div>

    </section>

    <section id="past-sales" class="subheader">
      <h2 class="permanent-marker-regular">Past Sales</h2>
      <div class="sale">
        <time class="sale-date" datetime="2026-04-03">April 3, 2026</time>

        <figure class="GFS">
          <img src="assets/img/GFS-flyer.png" alt="Placeholder image" />
          <figcaption>Good Friday Sale</figcaption>
        </figure>

      </div>

    </section>
  </main>

  <footer class="primary" id="footer">
    <h3><strong>Contact Us</strong></h3>
    <!-- Gmail Icon -->
    <div class="social-row">
      <a href="mailto:thepitcommander@gmail.com" class="social gmail" aria-label="Gmail">
        <img src="assets/img/Gmail_icon_(2020).svg.webp" width="30" height="30">
      </a>

      <!-- Facebook Icon -->
      <a href="https://facebook.com/tommy.m.pope" target="_blank" class="social fb" aria-label="Facebook">
        <img src="assets/img/facebook-logo.png" width="30" height="30"> </a>

    </div>
    <p>&copy; 2026 Javion White</p>
  </footer>

</body>

</html>
